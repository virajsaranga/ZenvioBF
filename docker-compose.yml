version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: zenvio_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: zenvio
    networks:
      - zenvio_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zenvio_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongodb:27017/zenvio
      - PORT=5000
    env_file:
      - ./backend/.env
    depends_on:
      - mongodb
    volumes:
      - uploads_data:/app/uploads
    networks:
      - zenvio_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: zenvio_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - zenvio_network

volumes:
  mongo_data:
  uploads_data:

networks:
  zenvio_network:
    driver: bridge
